<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bitcoin E-Commerce - Generar Factura</title>
 <style>
        :root {
            --primary-color: #f7931a; /* Naranja Bitcoin */
            --secondary-color: #000000; /* Negro */
            --background-color: #f8f9fa;
            --card-color: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            background-color: var(--card-color);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-top: 20px;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--secondary-color);
        }

        input[type="text"],
        input[type="email"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input[type="number"] {
            width: 80px;
            text-align: center;
        }

        .product-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 10px;
            background-color: #fefefe;
        }

        .product-item input[type="checkbox"] {
            margin-right: 10px;
        }

        .product-item label {
            flex: 1;
            margin-bottom: 0;
            font-weight: normal;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            background-color: #e67e22;
        }

        button i {
            font-size: 18px;
        }

        .total-section {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 6px;
            display: none;
        }

        .total-section h3 {
            margin-top: 0;
            color: var(--secondary-color);
        }

        .bitcoin-icon {
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <h1>Generar Factura</h1>
    <form id="invoiceForm">
        <div class="form-group">
            <label for="customer_name">Nombre del Cliente:</label>
            <input type="text" id="customer_name" required>
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group">
            <label>Selecciona Productos:</label>
            <div id="products"></div>
        </div>

        <button type="button" onclick="generateInvoice()">Generar Factura</button>
    </form>

    <script>
        // Lista de productos (puedes cargarlos desde products.csv usando fetch si prefieres)
        const products = [
            { name: "Libro: Bitcoin para Principiantes", price_btc: 0.0004 },
            { name: "Camiseta: Adopta Bitcoin", price_btc: 0.00031 },
            { name: "Taza: Stacking Sats", price_btc: 0.0002 },
            { name: "Sticker: Lightning Network", price_btc: 0.0001 }
        ];

        // Cargar productos en el formulario
        const productsDiv = document.getElementById('products');
        products.forEach((product, index) => {
            const div = document.createElement('div');
            div.innerHTML = `
                <input type="checkbox" id="product_${index}" name="product" value="${product.name}">
                <label for="product_${index}">${product.name} - ${product.price_btc} BTC</label>
                <input type="number" id="quantity_${index}" min="1" value="1" style="width: 50px;">
            `;
            productsDiv.appendChild(div);
        });

        // Función para generar la factura
        function generateInvoice() {
            const customerName = document.getElementById('customer_name').value;
            const email = document.getElementById('email').value;

            const selectedProducts = [];
            products.forEach((product, index) => {
                const checkbox = document.getElementById(`product_${index}`);
                if (checkbox.checked) {
                    const quantity = parseInt(document.getElementById(`quantity_${index}`).value);
                    selectedProducts.push({
                        product: { name: product.name, price_btc: product.price_btc },
                        quantity: quantity,
                        total_btc: product.price_btc * quantity
                    });
                }
            });

            if (selectedProducts.length === 0) {
                alert('Debes seleccionar al menos un producto.');
                return;
            }

            const totalBtc = selectedProducts.reduce((sum, item) => sum + item.total_btc, 0);

            // Enviar datos a Python usando fetch (requiere un servidor local)
            fetch('http://localhost:5000/generate_invoice', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    customer_name: customerName,
                    items: selectedProducts,
                    total_btc: totalBtc
                })
            })
            .then(response => response.blob())
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `factura_${customerName.replace(' ', '_')}.pdf`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error al generar la factura.');
            });
        }
    </script>
</body>
</html>
